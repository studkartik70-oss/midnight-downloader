<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault | Premium Video Extraction</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-gradient"></div>
    
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">✦</span> StreamVault
        </div>
        <div class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#">History</a>
            <a href="#">About</a>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <h1>Download with <span class="accent-text">Precision.</span></h1>
            <p class="subtitle">Extract high-performance video streams instantly.</p>
            
            <div class="input-group glass">
                <input type="text" id="urlInput" placeholder="Paste your YouTube link here..." autocomplete="off">
                <button id="analyzeBtn">Extract Now</button>
            </div>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Analyzing link metadata...</p>
        </div>

        <div id="resultArea" class="hidden">
            <div class="result-card glass">
                <div class="thumbnail-wrapper">
                    <img id="thumbnail" src="" alt="Video Thumbnail">
                    <div class="quality-badge">HD</div>
                </div>
                <div class="video-details">
                    <h2 id="videoTitle">Video Title</h2>
                    <p class="author" id="videoAuthor">Author Name</p>
                    <div class="format-selection">
                        <h3>Select Quality</h3>
                        <div id="formatList" class="format-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 StreamVault. High-speed extraction protocol active.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
